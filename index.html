<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/favicon/favicon.svg" type="image/x-icon">
</head>
<body>

<header>
    <div><img src="assets/logo/Fotogram_Logo.svg" alt="Fotogram Logo"></div>
</header>

<main>
    <h1>Mein Projekt Fotoalbum</h1>

    <section>
        <div id="galerie"></div>
    </section>
</main>

<div id="modal" class="versteckt" role="dialog" aria-modal="true" aria-label="Bildansicht">
    <div id="modal-hintergrund"></div>
    <div id="modal-inhalt">
        <img  id="modal-bild" src="" alt="Großansicht">
        <button id="btn-schliessen" aria-label ="Bild schließen">&#8855;</button>
        <button id="btn-zurueck" aria-label ="Vorheriges Bild">&#8592;</button>
        <button id="btn-weiter" aria-label ="Nächstes Bild">&#8594;</button>
    </div>
</div>

<footer>
    <div class="footer-content">
        <img src="assets/img/developer-akademie.png" alt="Developer Akademie Logo">
        <p>Developer Akademie GmbH</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
